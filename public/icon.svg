<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d83ff" />
      <stop offset="100%" stop-color="#6e45fb" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <circle cx="12" cy="12" r="10" fill="url(#coinGrad)" filter="url(#glow)"/>
  
  <!-- Outer metallic ring -->
  <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  
  <!-- F symbol -->
  <path d="M10 8h5v2h-3v2h2v2h-2v4h-2V8z" fill="#ffffff" />
</svg>
